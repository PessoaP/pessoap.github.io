<!DOCTYPE html>
<html>
<head>
  <title>Downloading PDF...</title>
  <script>
    window.onload = function () {
      const link = document.createElement("a");
      link.href = "https://pessoap.github.io/symposium_plus.pdf";
      link.download = "symposium_plus.pdf";
      document.body.appendChild(link);
      link.click();

      // Send user to the real symposium page after 6 seconds
      setTimeout(function () {
        window.location.href = "https://pessoap.github.io/symposium/index.html?downloaded=1";
      }, 6000);
    };
  </script>
</head>
<body>
  <p>Your PDF should download automatically.</p>
  <p>You will be redirected to the symposium page shortly.</p>
  <p>
    <a href="https://pessoap.github.io/symposium_plus.pdf" download>
      Click here if the download does not start.
    </a>
  </p>
</body>
</html>
